name: Build and Release

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Go code is not formatted:"
            gofmt -s -d .
            exit 1
          fi

      - name: Build
        run: go build -v ./...

  build:
    name: Build
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux builds
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            output: mpdl-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            output: mpdl-linux-arm64
          - os: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: '7'
            output: mpdl-linux-armv7
          - os: ubuntu-latest
            goos: linux
            goarch: '386'
            output: mpdl-linux-386

          # Windows builds
          - os: windows-latest
            goos: windows
            goarch: amd64
            output: mpdl-windows-amd64.exe
          - os: windows-latest
            goos: windows
            goarch: arm64
            output: mpdl-windows-arm64.exe
          - os: windows-latest
            goos: windows
            goarch: '386'
            output: mpdl-windows-386.exe

          # macOS builds
          - os: macos-latest
            goos: darwin
            goarch: amd64
            output: mpdl-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            output: mpdl-darwin-arm64

          # FreeBSD builds
          - os: ubuntu-latest
            goos: freebsd
            goarch: amd64
            output: mpdl-freebsd-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Get dependencies
        run: go mod download

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build -v -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ${{ matrix.output }}

      - name: Create archive (Unix)
        if: matrix.goos != 'windows'
        run: |
          tar -czf ${{ matrix.output }}.tar.gz ${{ matrix.output }} README.md LICENSE

      - name: Create archive (Windows)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path ${{ matrix.output }},README.md,LICENSE -DestinationPath ${{ matrix.output }}.zip

      - name: Upload artifact (Unix)
        if: matrix.goos != 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}.tar.gz
          retention-days: 5

      - name: Upload artifact (Windows)
        if: matrix.goos == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}.zip
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            for file in *; do
              sha256sum "$file" >> ../../checksums.txt
            done
            cd ..
          done
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            checksums.txt
          body: |
            ## Installation

            ### Linux / macOS
            ```bash
            # Download the appropriate binary for your system
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/mpdl-linux-amd64.tar.gz
            tar -xzf mpdl-linux-amd64.tar.gz
            chmod +x mpdl-linux-amd64
            sudo mv mpdl-linux-amd64 /usr/local/bin/mpdl
            ```

            ### Windows
            ```powershell
            # Download mpdl-windows-amd64.exe.zip
            # Extract and add to PATH
            ```

            ### Verify checksums
            ```bash
            sha256sum -c checksums.txt
            ```

            ## What's Changed
            
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details.

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
