name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows
            arch: amd64
            runner: windows-latest
            binary: mpdl.exe
          - os: windows
            arch: arm64
            runner: windows-latest
            binary: mpdl.exe

          # Linux
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            binary: mpdl
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            binary: mpdl
          - os: linux
            arch: arm
            runner: ubuntu-latest
            binary: mpdl

          # macOS
          - os: darwin
            arch: amd64
            runner: macos-latest
            binary: mpdl
          - os: darwin
            arch: arm64
            runner: macos-latest
            binary: mpdl

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Get dependencies
        run: |
          go mod download
          go mod verify

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -v -trimpath -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ${{ matrix.binary }} .

      - name: Create archive (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $archiveName = "mpdl-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.zip"
          Compress-Archive -Path ${{ matrix.binary }},README.md,LICENSE -DestinationPath $archiveName
          echo "ARCHIVE_NAME=$archiveName" >> $env:GITHUB_ENV
          echo "ARCHIVE_PATH=$archiveName" >> $env:GITHUB_ENV

      - name: Create archive (Unix)
        if: matrix.os != 'windows'
        run: |
          ARCHIVE_NAME="mpdl-${{ github.ref_name }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          tar -czf $ARCHIVE_NAME ${{ matrix.binary }} README.md LICENSE
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV
          echo "ARCHIVE_PATH=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mpdl-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ env.ARCHIVE_PATH }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            cd "$dir"
            for file in *; do
              sha256sum "$file" >> ../../checksums.txt
            done
            cd ..
          done
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            checksums.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## mpdl — Advanced MPD CLI Client

            ### Installation

            **Linux / macOS:**
            ```bash
            tar -xzf mpdl-*-linux-amd64.tar.gz
            sudo mv mpdl /usr/local/bin/
            ```

            **Windows:**
            ```powershell
            # Extract mpdl-*-windows-amd64.zip and add to PATH
            ```

            **Verify checksum:**
            ```bash
            sha256sum -c checksums.txt
            ```

            ### Platforms
            | Platform | File |
            |---|---|
            | Windows x64 | `mpdl-*-windows-amd64.zip` |
            | Windows ARM64 | `mpdl-*-windows-arm64.zip` |
            | Linux x64 | `mpdl-*-linux-amd64.tar.gz` |
            | Linux ARM64 | `mpdl-*-linux-arm64.tar.gz` |
            | Linux ARM | `mpdl-*-linux-arm.tar.gz` |
            | macOS Intel | `mpdl-*-darwin-amd64.tar.gz` |
            | macOS Apple Silicon | `mpdl-*-darwin-arm64.tar.gz` |

            See [CHANGELOG.md](CHANGELOG.md) for what changed.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
